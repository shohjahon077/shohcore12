<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shohcore12 | Musiqa</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --primary-light: #60a5fa;
            --primary-dark: #2563eb;
            --primary-glow: rgba(59, 130, 246, 0.5);
            --secondary: #8b5cf6;
            --secondary-glow: rgba(139, 92, 246, 0.5);
            --accent: #06b6d4;
            --accent-glow: rgba(6, 182, 212, 0.5);
            --bg: #0a0e1a;
            --bg-card: #151e32;
            --bg-hover: #1e2a45;
            --text: #f8fafc;
            --text-sec: #94a3b8;
            --border: #2d3748;
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 25px 50px rgba(0, 0, 0, 0.5);
            --gradient: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 50%, #06b6d4 100%);
            --gradient-animated: linear-gradient(-45deg, #3b82f6, #8b5cf6, #06b6d4, #3b82f6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            padding-bottom: 85px;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--gradient);
            border-radius: 4px;
        }

        /* HEADER */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 14, 26, 0.98);
            backdrop-filter: blur(30px);
            padding: 20px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: var(--shadow);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--text);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .logo span {
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 3s ease infinite;
            background-size: 200% 200%;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* MUSIC CONTAINER */
        .music-container {
            max-width: 680px;
            margin: 0 auto;
            padding: 20px 15px;
        }

        /* SEARCH BOX */
        .music-search {
            position: relative;
            margin-bottom: 25px;
        }

        .search-wrapper {
            position: relative;
            background: var(--bg-card);
            border-radius: 16px;
            border: 2px solid var(--border);
            transition: all 0.3s;
        }

        .search-wrapper:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-glow);
        }

        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-sec);
            font-size: 1.1rem;
        }

        .search-input {
            width: 100%;
            padding: 16px 20px 16px 55px;
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
        }

        /* FILTERS */
        .music-filters {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            overflow-x: auto;
            padding-bottom: 10px;
            scrollbar-width: none;
        }

        .music-filters::-webkit-scrollbar {
            display: none;
        }

        .filter-chip {
            padding: 10px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 25px;
            color: var(--text-sec);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s;
            font-family: inherit;
        }

        .filter-chip:hover {
            background: var(--bg-hover);
            color: var(--text);
            transform: translateY(-2px);
        }

        .filter-chip.active {
            background: var(--gradient);
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        /* NOW PLAYING BAR */
        .now-playing-bar {
            position: fixed;
            bottom: 80px;
            left: 0;
            width: 100%;
            background: rgba(21, 30, 50, 0.98);
            backdrop-filter: blur(30px);
            border-top: 1px solid var(--border);
            padding: 12px 20px;
            z-index: 600;
            display: none;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .now-playing-bar.active {
            display: block;
            transform: translateY(0);
        }

        .now-playing-content {
            max-width: 680px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .now-playing-cover {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            object-fit: cover;
            border: 2px solid var(--primary);
            animation: rotateCover 3s linear infinite paused;
        }

        .now-playing-cover.playing {
            animation-play-state: running;
        }

        @keyframes rotateCover {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .now-playing-info {
            flex: 1;
            min-width: 0;
        }

        .now-playing-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .now-playing-artist {
            font-size: 0.8rem;
            color: var(--text-sec);
        }

        .now-playing-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .np-btn {
            background: none;
            border: none;
            color: var(--text);
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.3s;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .np-btn:hover {
            color: var(--primary-light);
            background: var(--bg-hover);
        }

        .np-btn-play {
            background: var(--gradient);
            color: white;
            width: 45px;
            height: 45px;
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        .np-btn-play:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px var(--primary-glow);
        }

        .progress-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--border);
            cursor: pointer;
        }

        .progress-bar {
            height: 100%;
            background: var(--gradient);
            border-radius: 3px;
            width: 0%;
            transition: width 0.1s linear;
        }

        /* MUSIC TRACKS LIST */
        .tracks-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .track-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 15px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            position: relative;
            overflow: hidden;
        }

        .track-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--gradient);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .track-card:hover {
            transform: translateX(5px);
            border-color: var(--primary);
            box-shadow: var(--shadow), 0 0 20px var(--primary-glow);
        }

        .track-card:hover::before {
            opacity: 1;
        }

        .track-card.playing {
            border-color: var(--primary);
            box-shadow: 0 0 30px var(--primary-glow);
        }

        .track-card.playing::before {
            opacity: 1;
        }

        .track-cover {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            object-fit: cover;
            border: 2px solid var(--border);
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }

        .track-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .track-cover-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .track-card:hover .track-cover-overlay {
            opacity: 1;
        }

        .track-cover-overlay i {
            color: white;
            font-size: 1.5rem;
        }

        .track-info {
            flex: 1;
            min-width: 0;
        }

        .track-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .track-artist {
            font-size: 0.85rem;
            color: var(--text-sec);
            margin-bottom: 6px;
        }

        .track-meta {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 0.75rem;
            color: var(--text-sec);
        }

        .track-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .track-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex-shrink: 0;
        }

        .track-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: var(--bg-hover);
            border: none;
            color: var(--text-sec);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .track-btn:hover {
            background: var(--primary);
            color: white;
            transform: scale(1.1);
        }

        .track-btn.play {
            background: var(--gradient);
            color: white;
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        /* EQUALIZER ANIMATION */
        .equalizer {
            display: flex;
            align-items: flex-end;
            gap: 3px;
            height: 20px;
        }

        .equalizer-bar {
            width: 4px;
            background: var(--gradient);
            border-radius: 2px;
            animation: equalize 0.5s ease-in-out infinite;
        }

        .equalizer-bar:nth-child(1) { animation-delay: 0s; height: 60%; }
        .equalizer-bar:nth-child(2) { animation-delay: 0.1s; height: 80%; }
        .equalizer-bar:nth-child(3) { animation-delay: 0.2s; height: 100%; }
        .equalizer-bar:nth-child(4) { animation-delay: 0.3s; height: 70%; }

        @keyframes equalize {
            0%, 100% { transform: scaleY(0.5); }
            50% { transform: scaleY(1); }
        }

        /* EMPTY STATE */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-sec);
        }

        .empty-icon {
            font-size: 5rem;
            margin-bottom: 20px;
            opacity: 0.3;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .empty-title {
            font-size: 1.3rem;
            color: var(--text);
            margin-bottom: 10px;
            font-weight: 700;
        }

        .empty-text {
            font-size: 0.95rem;
        }

        /* BOTTOM NAV */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 80px;
            background: rgba(21, 30, 50, 0.98);
            backdrop-filter: blur(30px);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 500;
            box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.5);
        }

        .nav-item {
            color: var(--text-sec);
            font-size: 0.75rem;
            text-align: center;
            text-decoration: none;
            width: 20%;
            transition: all 0.3s;
            padding: 10px 0;
            position: relative;
        }

        .nav-item i {
            font-size: 1.6rem;
            display: block;
            margin-bottom: 8px;
            transition: all 0.3s;
        }

        .nav-item::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 3px;
            background: var(--gradient);
            border-radius: 3px;
            transition: width 0.3s;
        }

        .nav-item:hover {
            color: var(--primary-light);
        }

        .nav-item:hover::after {
            width: 30px;
        }

        .nav-item.active {
            color: var(--primary-light);
        }

        .nav-item.active i {
            transform: translateY(-5px);
            filter: drop-shadow(0 0 15px var(--primary-glow));
        }

        .nav-item.active::after {
            width: 40px;
        }

        /* ANIMATIONS */
        .fade-in {
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .track-card {
            animation: slideIn 0.4s ease backwards;
        }

        .track-card:nth-child(1) { animation-delay: 0.05s; }
        .track-card:nth-child(2) { animation-delay: 0.1s; }
        .track-card:nth-child(3) { animation-delay: 0.15s; }
        .track-card:nth-child(4) { animation-delay: 0.2s; }
        .track-card:nth-child(5) { animation-delay: 0.25s; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* FULL SCREEN PLAYER */
        .fullscreen-player {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 14, 26, 0.98);
            backdrop-filter: blur(30px);
            z-index: 2000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .fullscreen-player.active {
            display: flex;
            animation: playerSlideUp 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes playerSlideUp {
            from { opacity: 0; transform: translateY(100%); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fp-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--bg-hover);
            border: none;
            color: var(--text);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .fp-close:hover {
            background: var(--danger);
            transform: rotate(90deg);
        }

        .fp-cover {
            width: 280px;
            height: 280px;
            border-radius: 20px;
            object-fit: cover;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            margin-bottom: 30px;
            animation: fpRotate 20s linear infinite paused;
        }

        .fp-cover.playing {
            animation-play-state: running;
        }

        @keyframes fpRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .fp-title {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 8px;
            text-align: center;
        }

        .fp-artist {
            font-size: 1rem;
            color: var(--text-sec);
            margin-bottom: 30px;
            text-align: center;
        }

        .fp-progress {
            width: 100%;
            max-width: 400px;
            margin-bottom: 30px;
        }

        .fp-progress-bar {
            width: 100%;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            cursor: pointer;
            position: relative;
        }

        .fp-progress-fill {
            height: 100%;
            background: var(--gradient);
            border-radius: 3px;
            width: 0%;
            position: relative;
        }

        .fp-progress-fill::after {
            content: '';
            position: absolute;
            right: -6px;
            top: 50%;
            transform: translateY(-50%);
            width: 12px;
            height: 12px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        .fp-time {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text-sec);
            margin-top: 10px;
        }

        .fp-controls {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .fp-btn {
            background: none;
            border: none;
            color: var(--text);
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .fp-btn:hover {
            color: var(--primary-light);
            transform: scale(1.1);
        }

        .fp-btn-play {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: var(--gradient);
            color: white;
            font-size: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 40px var(--primary-glow);
        }

        .fp-btn-play:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 50px var(--primary-glow);
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <div class="header">
        <div class="logo">SHOH<span>CORE12</span></div>
    </div>

    <!-- MUSIC CONTAINER -->
    <div class="music-container">
        <!-- Search -->
        <div class="music-search">
            <div class="search-wrapper">
                <i class="fas fa-search search-icon"></i>
                <input type="text" class="search-input" id="musicSearch" placeholder="Qo'shiq qidirish..." autocomplete="off">
            </div>
        </div>

        <!-- Filters -->
        <div class="music-filters">
            <button class="filter-chip active" onclick="filterMusic('all')">
                <i class="fas fa-th"></i> Barchasi
            </button>
            <button class="filter-chip" onclick="filterMusic('trending')">
                <i class="fas fa-fire"></i> Trending
            </button>
            <button class="filter-chip" onclick="filterMusic('new')">
                <i class="fas fa-clock"></i> Yangi
            </button>
            <button class="filter-chip" onclick="filterMusic('popular')">
                <i class="fas fa-star"></i> Ommabop
            </button>
            <button class="filter-chip" onclick="filterMusic('uzbek')">
                <i class="fas fa-flag"></i> O'zbekcha
            </button>
            <button class="filter-chip" onclick="filterMusic('foreign')">
                <i class="fas fa-globe"></i> Chet el
            </button>
        </div>

        <!-- Tracks List -->
        <div class="tracks-list" id="tracksList">
            <!-- Tracks will be injected here -->
        </div>

        <!-- Empty State -->
        <div class="empty-state" id="emptyState" style="display: none;">
            <i class="fas fa-music empty-icon"></i>
            <div class="empty-title">Musiqa topilmadi</div>
            <div class="empty-text">Qidiruv so'zingizni o'zgartirib ko'ring</div>
        </div>
    </div>

    <!-- NOW PLAYING BAR -->
    <div class="now-playing-bar" id="nowPlayingBar">
        <div class="progress-container" onclick="seekTrack(event)">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="now-playing-content">
            <img src="" alt="" class="now-playing-cover" id="npCover">
            <div class="now-playing-info">
                <div class="now-playing-title" id="npTitle">Nomi</div>
                <div class="now-playing-artist" id="npArtist">Ijrochi</div>
            </div>
            <div class="now-playing-controls">
                <button class="np-btn" onclick="prevTrack()">
                    <i class="fas fa-step-backward"></i>
                </button>
                <button class="np-btn np-btn-play" onclick="togglePlay()">
                    <i class="fas fa-play" id="npPlayIcon"></i>
                </button>
                <button class="np-btn" onclick="nextTrack()">
                    <i class="fas fa-step-forward"></i>
                </button>
                <button class="np-btn" onclick="openFullscreenPlayer()">
                    <i class="fas fa-expand"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- FULLSCREEN PLAYER -->
    <div class="fullscreen-player" id="fullscreenPlayer">
        <button class="fp-close" onclick="closeFullscreenPlayer()">
            <i class="fas fa-times"></i>
        </button>
        <img src="" alt="" class="fp-cover" id="fpCover">
        <div class="fp-title" id="fpTitle">Nomi</div>
        <div class="fp-artist" id="fpArtist">Ijrochi</div>
        <div class="fp-progress">
            <div class="fp-progress-bar" onclick="seekFullscreen(event)">
                <div class="fp-progress-fill" id="fpProgressBar"></div>
            </div>
            <div class="fp-time">
                <span id="fpCurrentTime">0:00</span>
                <span id="fpDuration">0:00</span>
            </div>
        </div>
        <div class="fp-controls">
            <button class="fp-btn" onclick="prevTrack()">
                <i class="fas fa-step-backward"></i>
            </button>
            <button class="fp-btn fp-btn-play" onclick="togglePlay()">
                <i class="fas fa-play" id="fpPlayIcon"></i>
            </button>
            <button class="fp-btn" onclick="nextTrack()">
                <i class="fas fa-step-forward"></i>
            </button>
        </div>
    </div>

    <!-- BOTTOM NAVIGATION -->
    <div class="bottom-nav">
        <a href="index.html" class="nav-item">
            <i class="fas fa-home"></i>
            Bosh Sahifa
        </a>
        <a href="qidiruv.html" class="nav-item">
            <i class="fas fa-search"></i>
            Qidiruv
        </a>
        <a href="music.html" class="nav-item active">
            <i class="fas fa-music"></i>
            Musiqa

        // ========================================
        // STATE
        // ========================================
        let currentTrack = null;
        let isPlaying = false;
        let currentFilter = 'all';
        let searchQuery = '';
        let audio = document.getElementById('audioPlayer');
        let progressInterval = null;

        // ========================================
        // INIT
        // ========================================
        document.addEventListener('DOMContentLoaded', () => {
            renderTracks(MUSIC_TRACKS);
            
            document.getElementById('musicSearch').addEventListener('input', (e) => {
                searchQuery = e.target.value.trim().toLowerCase();
                filterAndRender();
            });

            // Audio events
            audio.addEventListener('timeupdate', updateProgress);
            audio.addEventListener('ended', nextTrack);
            audio.addEventListener('loadedmetadata', () => {
                document.getElementById('fpDuration').innerText = formatTime(audio.duration);
            });
        });

        // ========================================
        // RENDER TRACKS
        // ========================================
        function renderTracks(tracks) {
            const list = document.getElementById('tracksList');
            const emptyState = document.getElementById('emptyState');

            if (tracks.length === 0) {
                list.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';

            list.innerHTML = tracks.map((track, index) => `
                <div class="track-card fade-in ${currentTrack && currentTrack.id === track.id ? 'playing' : ''}" onclick="playTrack(${track.id})">
                    <div class="track-cover">
                        <img src="${track.cover}" alt="${track.title}">
                        <div class="track-cover-overlay">
                            <i class="fas fa-play"></i>
                        </div>
                    </div>
                    <div class="track-info">
                        <div class="track-title">${track.title}</div>
                        <div class="track-artist">${track.artist}</div>
                        <div class="track-meta">
                            <span><i class="fas fa-play-circle"></i> ${formatNumber(track.plays)}</span>
                            <span><i class="fas fa-clock"></i> ${track.duration}</span>
                            ${track.trending ? '<span><i class="fas fa-fire" style="color: var(--danger)"></i> Trend</span>' : ''}
                        </div>
                    </div>
                    <div class="track-actions">
                        <button class="track-btn play" onclick="event.stopPropagation(); playTrack(${track.id})">
                            <i class="fas fa-play"></i>
                        </button>
                        <button class="track-btn" onclick="event.stopPropagation(); downloadTrack(${track.id})">
                            <i class="fas fa-download"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // ========================================
        // FILTER MUSIC
        // ========================================
        function filterMusic(category) {
            currentFilter = category;
            
            document.querySelectorAll('.filter-chip').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.closest('.filter-chip').classList.add('active');
            
            filterAndRender();
        }

        function filterAndRender() {
            let filtered = [...MUSIC_TRACKS];

            if (currentFilter !== 'all') {
                if (currentFilter === 'trending') {
                    filtered = filtered.filter(t => t.trending);
                } else if (currentFilter === 'uzbek' || currentFilter === 'foreign') {
                    filtered = filtered.filter(t => t.category === currentFilter);
                } else if (currentFilter === 'popular') {
                    filtered = filtered.sort((a, b) => b.plays - a.plays);
                } else if (currentFilter === 'new') {
                    filtered = filtered.sort((a, b) => b.id - a.id);
                }
            }

            if (searchQuery) {
                filtered = filtered.filter(t => 
                    t.title.toLowerCase().includes(searchQuery) ||
                    t.artist.toLowerCase().includes(searchQuery)
                );
            }

            renderTracks(filtered);
        }

        // ========================================
        // PLAY FUNCTIONS
        // ========================================
        function playTrack(id) {
            const track = MUSIC_TRACKS.find(t => t.id === id);
            if (!track) return;

            currentTrack = track;
            isPlaying = true;

            audio.src = track.audio;
            audio.play();

            updateNowPlayingBar();
            updateFullscreenPlayer();
            renderTracks(getFilteredTracks());

            showNowPlayingBar();
        }

        function togglePlay() {
            if (!currentTrack) return;

            if (isPlaying) {
                audio.pause();
                isPlaying = false;
            } else {
                audio.play();
                isPlaying = true;
            }

            updatePlayIcons();
            updateNowPlayingCover();
        }

        function nextTrack() {
            if (!currentTrack) return;
            
            const currentIndex = MUSIC_TRACKS.findIndex(t => t.id === currentTrack.id);
            const nextIndex = (currentIndex + 1) % MUSIC_TRACKS.length;
            playTrack(MUSIC_TRACKS[nextIndex].id);
        }

        function prevTrack() {
            if (!currentTrack) return;
            
            const currentIndex = MUSIC_TRACKS.findIndex(t => t.id === currentTrack.id);
            const prevIndex = (currentIndex - 1 + MUSIC_TRACKS.length) % MUSIC_TRACKS.length;
            playTrack(MUSIC_TRACKS[prevIndex].id);
        }

        // ========================================
        // PROGRESS
        // ========================================
        function updateProgress() {
            if (!audio.duration) return;

            const progress = (audio.currentTime / audio.duration) * 100;
            document.getElementById('progressBar').style.width = `${progress}%`;
            document.getElementById('fpProgressBar').style.width = `${progress}%`;
            document.getElementById('fpCurrentTime').innerText = formatTime(audio.currentTime);
        }

        function seekTrack(event) {
            if (!currentTrack) return;
            
            const container = event.currentTarget;
            const rect = container.getBoundingClientRect();
            const percent = (event.clientX - rect.left) / rect.width;
            audio.currentTime = percent * audio.duration;
        }

        function seekFullscreen(event) {
            seekTrack(event);
        }

        // ========================================
        // NOW PLAYING BAR
        // ========================================
        function showNowPlayingBar() {
            document.getElementById('nowPlayingBar').classList.add('active');
            updatePlayIcons();
            updateNowPlayingCover();
        }

        function updateNowPlayingBar() {
            if (!currentTrack) return;

            document.getElementById('npTitle').innerText = currentTrack.title;
            document.getElementById('npArtist').innerText = currentTrack.artist;
            document.getElementById('npCover').src = currentTrack.cover;
        }

        function updateNowPlayingCover() {
            const cover = document.getElementById('npCover');
            if (isPlaying) {
                cover.classList.add('playing');
            } else {
                cover.classList.remove('playing');
            }
        }

        function updatePlayIcons() {
            const npIcon = document.getElementById('npPlayIcon');
            const fpIcon = document.getElementById('fpPlayIcon');
            
            if (isPlaying) {
                npIcon.className = 'fas fa-pause';
                fpIcon.className = 'fas fa-pause';
            } else {
                npIcon.className = 'fas fa-play';
                fpIcon.className = 'fas fa-play';
            }
        }

        // ========================================
        // FULLSCREEN PLAYER
        // ========================================
        function openFullscreenPlayer() {
            if (!currentTrack) return;

            document.getElementById('fullscreenPlayer').classList.add('active');
            updateFullscreenPlayer();
            updatePlayIcons();
        }

        function closeFullscreenPlayer() {
            document.getElementById('fullscreenPlayer').classList.remove('active');
        }

        function updateFullscreenPlayer() {
            if (!currentTrack) return;

            document.getElementById('fpTitle').innerText = currentTrack.title;
            document.getElementById('fpArtist').innerText = currentTrack.artist;
            document.getElementById('fpCover').src = currentTrack.cover;
            
            const fpCover = document.getElementById('fpCover');
            if (isPlaying) {
                fpCover.classList.add('playing');
            } else {
                fpCover.classList.remove('playing');
            }
        }

        // ========================================
        // DOWNLOAD
        // ========================================
        function downloadTrack(id) {
            const track = MUSIC_TRACKS.find(t => t.id === id);
            if (!track) return;

            // Simulate download
            alert(`🎵 "${track.title}" yuklanmoqda...`);
        }

        // ========================================
        // HELPERS
        // ========================================
        function getFilteredTracks() {
            let filtered = [...MUSIC_TRACKS];

            if (currentFilter !== 'all') {
                if (currentFilter === 'trending') {
                    filtered = filtered.filter(t => t.trending);
                } else if (currentFilter === 'uzbek' || currentFilter === 'foreign') {
                    filtered = filtered.filter(t => t.category === currentFilter);
                } else if (currentFilter === 'popular') {
                    filtered = filtered.sort((a, b) => b.plays - a.plays);
                } else if (currentFilter === 'new') {
                    filtered = filtered.sort((a, b) => b.id - a.id);
                }
            }

            if (searchQuery) {
                filtered = filtered.filter(t => 
                    t.title.toLowerCase().includes(searchQuery) ||
                    t.artist.toLowerCase().includes(searchQuery)
                );
            }

            return filtered;
        }

        function formatNumber(num) {
            if (num >= 1000) {
                return (num / 1000).toFixed(1) + 'K';
            }
            return num;
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }
